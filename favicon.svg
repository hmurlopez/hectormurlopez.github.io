<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue background -->
  <rect width="100" height="100" fill="#4a8fc4"/>

  <!-- Yellow organic blob — top right -->
  <path d="M62,0 Q100,0 100,38 Q85,26 72,14 Q66,7 62,0Z" fill="#f9c027"/>

  <!-- Yellow organic blob — bottom left -->
  <path d="M0,68 Q14,58 24,72 Q18,90 0,100Z" fill="#f9c027"/>

  <!-- Dark navy blob — top left -->
  <path d="M0,0 Q24,0 28,20 Q22,37 0,44Z" fill="#0d1b2a"/>

  <!-- Lightbulb body: cream circle -->
  <circle cx="50" cy="44" r="21" fill="#f5f0e6" stroke="#0d1b2a" stroke-width="3.5"/>

  <!-- Lightbulb base — wide strip -->
  <rect x="41" y="62" width="18" height="5.5" fill="#f5f0e6" stroke="#0d1b2a" stroke-width="2.5"/>

  <!-- Lightbulb base — narrow strip -->
  <rect x="43" y="67.5" width="14" height="4.5" rx="1" fill="#f5f0e6" stroke="#0d1b2a" stroke-width="2.5"/>

  <!-- Inner filament dot -->
  <circle cx="50" cy="44" r="5.5" fill="#0d1b2a"/>

  <!-- Filament leads -->
  <path d="M47,60 L46,52" stroke="#0d1b2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M53,60 L54,52" stroke="#0d1b2a" stroke-width="2" stroke-linecap="round"/>
</svg>
